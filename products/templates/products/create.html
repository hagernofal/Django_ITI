{% extends "base.html" %}
{% load static %}

{% block title %}Create Product{% endblock %}

{% block page_header %}
  <h1>Create New Product</h1>
{% endblock %}

{% block content %}
<div class="card" style="padding:16px; max-width:500px; margin:auto; background:var(--card-2); border:1px solid var(--stroke); border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.1)">
  
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div style="margin-bottom:12px;">
      <label for="id_name">Name:</label>
      <input type="text" name="name" id="id_name" class="input" style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;">
    </div>
    
    <div style="margin-bottom:12px;">
      <label for="id_stock">Stock:</label>
      <input type="number" name="stock" id="id_stock" class="input" style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;">
    </div>

    <div style="margin-bottom:12px;">
      <label for="id_price">Price:</label>
      <input type="number" step="0.01" name="price" id="id_price" class="input" style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;">
    </div>

    <div style="margin-bottom:12px;">
      <label for="id_description">Description:</label>
      <textarea name="description" id="id_description" class="input" style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;"></textarea>
    </div>

    <div style="margin-bottom:12px;">
      <label for="id_image">Image:</label>
      <input type="file" name="image" id="id_image" class="input" style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;">
    </div>
<div style="margin-bottom:12px;">
  <label for="id_category">Category:</label>
  <select name="category" id="id_category"
          style="width:100%; padding:8px; border:1px solid var(--stroke); border-radius:6px;">
    
    <option value="" disabled selected> Select Category </option>

    {% for category in categories %}
      <option value="{{ category.id }}">
        {{ category.name }}
      </option>
    {% endfor %}

  </select>
</div>
    <div style="margin-top:16px; display:flex; gap:12px;">
      <button type="submit" class="btn btn-primary">Create Product</button>
      <a class="btn btn-secondary" href="{% url 'products' %}">Back to Products</a>
    </div>

  </form>
</div>

<style>
  @media (max-width: 600px){
    .card {
      width: 90% !important;
      padding: 12px !important;
    }
  }
</style>
{% endblock %}
