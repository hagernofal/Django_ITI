{% extends "base.html" %}

{% block title %}Contact{% endblock %}

{% block page_header %}
  <h1>Contact</h1>
  <p>
    welcome to contact page.
  </p>
{% endblock %}

{% block content %}
<div class="card">
  <div class="content">
    <div style="display:flex; gap:14px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; margin-bottom:14px">

      
    </div>

    

      <div style="padding:14px; border-radius:14px; background:var(--card-2); border:1px solid var(--stroke)">
        <form method="post">
          {% csrf_token %}

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div>
              <label class="contact-label" for="name">Name</label>
              <input class="contact-input" id="name" name="name" type="text" placeholder="Your name" required />
            </div>
            <div>
              <label class="contact-label" for="email">Email</label>
              <input class="contact-input" id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>
          </div>

          <div style="margin-top:10px">
            <label class="contact-label" for="message">Message</label>
            <textarea
              class="contact-input contact-textarea"
              id="message"
              name="message"
              rows="6"
              placeholder="Write your message..."
              required
            ></textarea>
          </div>

          <div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <button class="btn btn-primary" type="submit">Send message</button>
          
          </div>
        </form>
      </div>
    </div>

    <style>
      .contact-label{
        display:block;
        font-weight:900;
        font-size:13px;
        margin:0 0 6px;
        color:var(--text);
      }
      .contact-input{
        width:100%;
        padding:12px 12px;
        border-radius:14px;
        border:1px solid var(--stroke);
        background:var(--card);
        color:var(--text);
        outline:none;
      }
      .contact-input::placeholder{
        color:var(--muted);
      }
      .contact-input:focus{
        border-color:var(--brand);
        box-shadow:0 0 0 3px rgba(255,107,107,.15);
      }
      .contact-textarea{
        resize:vertical;
        min-height:160px;
      }
    </style>
  </div>
</div>
{% endblock %}
